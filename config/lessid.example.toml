# lessid configuration file
# Copy this file to config/lessid.toml and fill in the real paths.
# config/lessid.toml is gitignored and should never be committed.
#
# Bootstrap:
#   cp config/lessid.example.toml config/lessid.toml
#   # then edit config/lessid.toml with your actual paths

# ── Paths ───────────────────────────────────────────────────────────────────
# Set these to real host paths. config/lessid.toml is gitignored — never commit it.
[paths]
# Directory containing per-site CPT source folders (each with a drnoc/ subdir)
cpt_base    = "/data/sas_queries/<study_owner>/<study>"

# Directory where de-identified CPT outputs are written (one subdir per site)
out_base    = "/data/sas_queries/<your_user>/lessid_drnoc"

# RESTRICTED: Directory where per-site mapping CSVs are stored (contains raw IDs)
lookup_base = "/data/sas_queries/<your_user>/lessid_lookup"

# Working directory for intermediate SAS datasets
work_base   = "/data/sas_queries/<your_user>/lessid_work"

# SAS executable — "sas" resolves via PATH; set to an absolute path to pin it
sas_bin     = "sas"

# ── Processing ──────────────────────────────────────────────────────────────
[processing]
# Date shift in days applied to all date/datetime columns.
# Set to 0 to disable date shifting.
date_shift_days = 0

# Explicit list of sites to process. Leave empty to process all sites
# found under cpt_base automatically.
# Example: sites = ["C7LC_compare_deq_q01", "C7CCHMC_compare_deq_q01"]
sites = []

# If true, reprocess sites even if a .cpt_completed marker file exists.
force = false

# Query version integer embedded in the mapping CSV 'query' column.
# Set to 1 for the first query run, 2 for the second, etc.
query_version = 1

# Number of sites to process in parallel.
# Each site runs in its own process; SAS is safe to parallelize per-site
# since each has its own working directory.
# Default (when omitted): max(2, cpu_count - 8) — reserves ~8 CPUs for the OS
# and other users, with a minimum of 2.
# parallel = 24

# ── Column selection ────────────────────────────────────────────────────────
[columns]
# Columns (lowercased) that end in 'id' but must NOT be remapped.
# These are values that look like IDs but carry no identifying information
# (e.g. trial enrollment codes, data mart identifiers).

# TODO: Never remap
# c_datamartid
# c_partid
# c_patid
# c_siteid
# c_trialid
# trial_siteid
# trialid
remap_never = [
    "participantid",
    "datamartid",
]

# Additional columns to remap that do NOT end in 'id'.
# Useful for label-style columns that still contain site-linkable values.
remap_extra = []

# Columns ending in 'id' to explicitly exclude from remapping.
# Takes precedence over the id$ pattern match.
remap_exclude = []

# Values that are pre-redacted placeholders in source data — never assign a
# surrogate ID to these. Case-insensitive. Colon-separated internally.
# Covers common EDC masking conventions (e.g. XXX, REDACTED).
pre_redacted_values = ["xxx", "redacted", "n/a", "na", "unknown", "unk", "-", "--", "masked"]

# PCORNet CDM tables to inspect during `pipeline audit`.
# Defaults to the full CDM table list when omitted. Override here to restrict
# the scan to a subset (e.g. if your study only needs to de-identify certain tables).
# known_tables = [
#     "DEMOGRAPHIC", "ENROLLMENT", "ENCOUNTER", "DIAGNOSIS", "PROCEDURES",
#     "VITAL", "DISPENSING", "LAB_RESULT_CM", "CONDITION", "PRO_CM",
#     "PRESCRIBING", "PCORNET_TRIAL", "DEATH", "DEATH_CAUSE", "MED_ADMIN",
#     "PROVIDER", "OBS_CLIN", "OBS_GEN", "HASH_TOKEN", "LDS_ADDRESS_HISTORY",
#     "IMMUNIZATION", "HARVEST", "LAB_HISTORY", "PAT_RELATIONSHIP",
#     "EXTERNAL_MEDS",
# ]

# Alias groups: columns that should share the same mapping key.
# Format: canonical_column = ["alias1", "alias2", ...]
# The canonical column's mapping is used for all aliases in the group,
# so the same original value gets the same new ID regardless of which
# column it appeared in.
#
# Example (disabled by default — uncomment if your data has these columns):
# [columns.aliases]
# providerid = [
#     "medadmin_providerid",
#     "obsgen_providerid",
#     "obsclin_providerid",
#     "rx_providerid",
#     "vx_providerid",
# ]
[columns.aliases]

# ── Backup ──────────────────────────────────────────────────────────────────
# After a successful run+verify, copy per-site lookup CSVs and de-identified
# outputs to a timestamped snapshot directory under backup_base.
# Snapshot path: {backup_base}/{query}_{YYYYMMDD_HHMMSS}/
#   lookups/<site_code>/   — mapping.csv + report.txt
#   outputs/<site>/        — de-identified XLSX/CPT outputs
#   lessid_run_<ts>.log    — run log
#
# Only verified-OK sites are included.  Errors per site are logged but
# non-fatal — a backup failure will not invalidate a completed pipeline run.
# Set enabled = false (or omit this section) to skip backup entirely.
[backup]
enabled     = false
backup_base = "/mnt/backups"
